services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: auticare_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - auticare_rag_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: auticare_redis
    ports:
      - "6379:6379"
    networks:
      - auticare_rag_network
    restart: unless-stopped

  api:
    build: .
    container_name: auticare_rag_api
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    volumes:
      - ./knowledge_base:/app/knowledge_base
    depends_on:
      - chromadb
      - redis
    networks:
      - auticare_rag_network
    restart: unless-stopped

volumes:
  chroma_data:

networks:
  auticare_rag_network:
    driver: bridge
